<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cullinary Prototype 03 - Focus Mode</title>
    <style>
      :root {
        color-scheme: dark;
        --black: #050505;
        --glass: rgba(12, 14, 14, 0.72);
        --glass-strong: rgba(17, 20, 20, 0.88);
        --line: rgba(255, 255, 255, 0.14);
        --text: #f3f5f4;
        --muted: #bac2be;
        --subtle: #818b86;
        --green: #4fd188;
        --amber: #f0a23d;
        --red: #ef6670;
        --cyan: #7cc8ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 1080px;
        height: 100vh;
        margin: 0;
        overflow: hidden;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--text);
        letter-spacing: 0;
        background: var(--black);
      }

      button {
        font: inherit;
      }

      .shell {
        position: relative;
        height: 100vh;
        overflow: hidden;
        background: #050505;
      }

      .photo {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 56px 54px 120px;
      }

      .frame {
        position: relative;
        width: min(100%, 1180px);
        height: min(100%, 720px);
        overflow: hidden;
        background:
          radial-gradient(circle at 70% 26%, rgba(255, 238, 190, 0.8) 0 5%, transparent 6%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.12), transparent 34%),
          linear-gradient(32deg, #171b22 0 28%, #40586b 29% 55%, #d3e4e8 56% 100%);
        border-radius: 4px;
        box-shadow: 0 40px 120px rgba(0, 0, 0, 0.78);
      }

      .frame::before {
        position: absolute;
        inset: auto 0 0;
        height: 44%;
        content: "";
        background:
          linear-gradient(145deg, transparent 0 26%, rgba(255, 255, 255, 0.18) 27% 29%, transparent 30%),
          linear-gradient(20deg, #0f1815 0 34%, #29433a 35% 56%, #6d7f55 57% 72%, #15241f 73% 100%);
      }

      .frame::after {
        position: absolute;
        inset: 0;
        content: "";
        background:
          linear-gradient(90deg, rgba(0, 0, 0, 0.45), transparent 18%, transparent 82%, rgba(0, 0, 0, 0.48)),
          linear-gradient(180deg, rgba(0, 0, 0, 0.26), transparent 25%, transparent 72%, rgba(0, 0, 0, 0.34));
      }

      .top-hud {
        position: absolute;
        top: 14px;
        right: 14px;
        left: 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-width: 0;
        pointer-events: none;
      }

      .brand,
      .hud-group,
      .metadata-tab {
        pointer-events: auto;
      }

      .brand {
        display: inline-flex;
        gap: 10px;
        align-items: center;
        height: 38px;
        padding: 0 14px;
        background: var(--glass);
        border: 1px solid var(--line);
        border-radius: 8px;
        backdrop-filter: blur(18px);
      }

      .brand strong {
        font-size: 14px;
      }

      .brand span {
        color: var(--muted);
        font-size: 12px;
      }

      .hud-group {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .hud-button {
        display: inline-flex;
        gap: 8px;
        align-items: center;
        height: 38px;
        padding: 0 12px;
        color: var(--text);
        cursor: pointer;
        background: var(--glass);
        border: 1px solid var(--line);
        border-radius: 8px;
        backdrop-filter: blur(18px);
      }

      .meta-strip {
        position: absolute;
        top: 72px;
        right: 14px;
        display: grid;
        gap: 8px;
        width: 244px;
      }

      .metadata-tab {
        display: grid;
        gap: 10px;
        padding: 14px;
        background: var(--glass);
        border: 1px solid var(--line);
        border-radius: 8px;
        backdrop-filter: blur(18px);
      }

      .metadata-tab h2 {
        margin: 0;
        font-size: 14px;
      }

      .row {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        color: var(--muted);
        font-size: 12px;
      }

      .row strong {
        color: var(--text);
        font-weight: 600;
      }

      .bottom-hud {
        position: absolute;
        right: 24px;
        bottom: 20px;
        left: 24px;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
        gap: 18px;
        align-items: end;
      }

      .asset {
        display: grid;
        gap: 6px;
        justify-self: start;
        min-width: 0;
        max-width: 460px;
        padding: 13px 14px;
        background: var(--glass);
        border: 1px solid var(--line);
        border-radius: 8px;
        backdrop-filter: blur(18px);
      }

      .asset strong {
        overflow: hidden;
        font-size: 15px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .asset span {
        overflow: hidden;
        color: var(--muted);
        font-size: 12px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .decision-dock {
        display: grid;
        grid-template-columns: repeat(3, 92px);
        gap: 8px;
        padding: 8px;
        background: var(--glass-strong);
        border: 1px solid var(--line);
        border-radius: 8px;
        backdrop-filter: blur(20px);
      }

      .decision {
        height: 44px;
        color: var(--text);
        cursor: pointer;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid var(--line);
        border-radius: 6px;
      }

      .decision.keep {
        color: #04120a;
        background: var(--green);
        border-color: var(--green);
      }

      .decision.edit {
        color: var(--amber);
      }

      .decision.reject {
        color: var(--red);
      }

      .progress {
        display: grid;
        gap: 9px;
        justify-self: end;
        width: 300px;
        padding: 13px 14px;
        background: var(--glass);
        border: 1px solid var(--line);
        border-radius: 8px;
        backdrop-filter: blur(18px);
      }

      .progress-line {
        height: 5px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.14);
        border-radius: 999px;
      }

      .progress-line span {
        display: block;
        width: 26%;
        height: 100%;
        background: var(--cyan);
      }

      .progress-text {
        display: flex;
        justify-content: space-between;
        color: var(--muted);
        font-size: 12px;
      }

      .film {
        position: absolute;
        bottom: 112px;
        left: 50%;
        display: flex;
        gap: 8px;
        width: min(720px, calc(100% - 420px));
        padding: 8px;
        overflow: hidden;
        background: var(--glass);
        border: 1px solid var(--line);
        border-radius: 8px;
        transform: translateX(-50%);
        backdrop-filter: blur(18px);
      }

      .thumb {
        position: relative;
        flex: 0 0 62px;
        height: 44px;
        overflow: hidden;
        background: var(--thumb);
        border: 2px solid transparent;
        border-radius: 5px;
      }

      .thumb.active {
        border-color: #ffffff;
      }

      .thumb::after {
        position: absolute;
        right: 4px;
        bottom: 4px;
        width: 9px;
        height: 9px;
        content: "";
        background: var(--dot, transparent);
        border-radius: 999px;
      }

      .t1 { --thumb: linear-gradient(35deg, #171b22 0 30%, #40586b 31% 55%, #d3e4e8 56% 100%); --dot: var(--green); }
      .t2 { --thumb: linear-gradient(150deg, #47202c 0 34%, #c57558 35% 60%, #eed1c4 61% 100%); --dot: var(--amber); }
      .t3 { --thumb: linear-gradient(30deg, #15211c 0 42%, #647d53 43% 64%, #dfe8c8 65% 100%); }
      .t4 { --thumb: linear-gradient(135deg, #221b2c 0 32%, #705c8f 33% 58%, #dcd7ee 59% 100%); --dot: var(--red); }
      .t5 { --thumb: linear-gradient(30deg, #27302b 0 36%, #637c70 37% 64%, #d6e3dc 65% 100%); --dot: var(--green); }
      .t6 { --thumb: linear-gradient(145deg, #342c25 0 38%, #8a7a57 39% 60%, #d8deb9 61% 100%); }
      .t7 { --thumb: linear-gradient(35deg, #1c2b2a 0 38%, #578078 39% 62%, #d1e3dc 63% 100%); }
      .t8 { --thumb: linear-gradient(150deg, #30252f 0 34%, #8b6276 35% 62%, #ead8de 63% 100%); }

      svg {
        display: block;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="photo">
        <div class="frame" role="img" aria-label="Selected landscape photo mock preview"></div>
      </div>

      <header class="top-hud">
        <div class="brand">
          <strong>Cullinary</strong>
          <span>37 / 142</span>
        </div>
        <div class="hud-group">
          <button class="hud-button" type="button">Open</button>
          <button class="hud-button" type="button">Rescan</button>
          <button class="hud-button" type="button">Move Plan</button>
        </div>
      </header>

      <aside class="meta-strip" aria-label="Image metadata">
        <section class="metadata-tab">
          <h2>Metadata</h2>
          <div class="row"><span>Type</span><strong>RAW + JPEG</strong></div>
          <div class="row"><span>Decision</span><strong>Keep</strong></div>
          <div class="row"><span>Camera</span><strong>Sony A7 IV</strong></div>
          <div class="row"><span>Captured</span><strong>19:42</strong></div>
        </section>
        <section class="metadata-tab">
          <h2>Move Plan</h2>
          <div class="row"><span>Keep</span><strong>24</strong></div>
          <div class="row"><span>Edit</span><strong>9</strong></div>
          <div class="row"><span>Reject</span><strong>4</strong></div>
        </section>
      </aside>

      <section class="film" aria-label="Photo filmstrip">
        <span class="thumb t1 active"></span>
        <span class="thumb t2"></span>
        <span class="thumb t3"></span>
        <span class="thumb t4"></span>
        <span class="thumb t5"></span>
        <span class="thumb t6"></span>
        <span class="thumb t7"></span>
        <span class="thumb t8"></span>
      </section>

      <footer class="bottom-hud">
        <div class="asset">
          <strong>DSC08421.ARW</strong>
          <span>/Volumes/Photo/Ingest/2026-06-24 Ridge Session</span>
        </div>
        <div class="decision-dock" aria-label="Decision controls">
          <button class="decision keep" type="button">Keep</button>
          <button class="decision edit" type="button">Edit</button>
          <button class="decision reject" type="button">Reject</button>
        </div>
        <div class="progress">
          <div class="progress-line"><span></span></div>
          <div class="progress-text">
            <span>37 marked</span>
            <span>0 conflicts</span>
          </div>
        </div>
      </footer>
    </main>
  </body>
</html>
