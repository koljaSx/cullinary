<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cullinary Prototype 06 - Stage &amp; Stack</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #070708;
        --bg-2: #0d0e10;
        --panel: #15161a;
        --line: #24262c;
        --text: #f1f2f5;
        --muted: #9b9faa;
        --subtle: #62656f;
        --keep: #3fb277;
        --edit: #d8983c;
        --reject: #db5d62;
        --focus: #7fb6ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 1080px;
        height: 100vh;
        margin: 0;
        overflow: hidden;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(120% 80% at 50% -10%, #14161b 0%, var(--bg) 60%),
          var(--bg);
      }

      button {
        font: inherit;
      }

      .shell {
        display: grid;
        grid-template-rows: 60px minmax(0, 1fr) auto;
        height: 100vh;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
      }

      .brand {
        display: flex;
        gap: 11px;
        align-items: center;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.2px;
      }

      .logo {
        display: grid;
        width: 28px;
        height: 28px;
        place-items: center;
        color: #070708;
        font-weight: 800;
        background: #eef3ee;
        border-radius: 8px;
      }

      .session {
        display: flex;
        gap: 14px;
        align-items: center;
        font-size: 13px;
        color: var(--muted);
      }

      .session .dot {
        width: 4px;
        height: 4px;
        background: var(--subtle);
        border-radius: 999px;
      }

      .ghost {
        display: inline-flex;
        gap: 8px;
        align-items: center;
        height: 34px;
        padding: 0 14px;
        color: var(--text);
        cursor: pointer;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 999px;
      }

      .stage {
        position: relative;
        display: grid;
        place-items: center;
        min-height: 0;
        padding: 8px 0 4px;
      }

      .deck {
        position: relative;
        display: grid;
        place-items: center;
        width: min(70vw, 880px);
        height: min(64vh, 600px);
      }

      .card {
        position: absolute;
        overflow: hidden;
        border: 1px solid #1d1f24;
        border-radius: 14px;
      }

      .card.peek {
        width: 70%;
        height: 78%;
        filter: brightness(0.4) saturate(0.7);
      }

      .card.prev {
        transform: translateX(-46%) rotate(-5deg);
      }

      .card.next {
        transform: translateX(46%) rotate(5deg);
      }

      .card.hero {
        z-index: 3;
        width: 100%;
        height: 100%;
        box-shadow: 0 40px 120px rgba(0, 0, 0, 0.7);
      }

      .ph {
        width: 100%;
        height: 100%;
      }

      .ph-dusk {
        background:
          radial-gradient(80% 60% at 70% 22%, rgba(255, 224, 178, 0.85) 0 8%, transparent 30%),
          linear-gradient(165deg, #16273a 0 38%, #34566b 39% 56%, #b98b5e 57% 74%, #f0d6a8 75% 100%);
      }

      .ph-forest {
        background: linear-gradient(28deg, #14231d 0 36%, #436659 37% 62%, #cdd4c6 63% 100%);
      }

      .ph-port {
        background:
          radial-gradient(60% 40% at 42% 32%, rgba(255, 226, 205, 0.7) 0 16%, transparent 40%),
          linear-gradient(150deg, #2a1c22 0 42%, #7c4f5d 43% 70%, #e3c3c8 71% 100%);
      }

      .badge {
        position: absolute;
        top: 16px;
        right: 16px;
        display: inline-flex;
        gap: 8px;
        align-items: center;
        height: 36px;
        padding: 0 14px;
        color: #06130b;
        font-size: 14px;
        font-weight: 800;
        background: var(--keep);
        border-radius: 999px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      }

      .caption {
        position: absolute;
        bottom: 16px;
        left: 16px;
        display: flex;
        gap: 12px;
        align-items: center;
        height: 34px;
        padding: 0 14px;
        color: #eef3ef;
        font-size: 13px;
        background: rgba(7, 7, 8, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 999px;
        backdrop-filter: blur(8px);
      }

      .caption strong {
        color: #fff;
      }

      .nav {
        position: absolute;
        top: 50%;
        z-index: 4;
        display: grid;
        width: 44px;
        height: 44px;
        color: var(--muted);
        cursor: pointer;
        background: rgba(20, 21, 25, 0.7);
        border: 1px solid var(--line);
        border-radius: 999px;
        place-items: center;
        transform: translateY(-50%);
      }

      .nav.left {
        left: -68px;
      }

      .nav.right {
        right: -68px;
      }

      .controls {
        display: grid;
        gap: 18px;
        justify-items: center;
        padding: 4px 0 26px;
      }

      .decisions {
        display: flex;
        gap: 18px;
        align-items: center;
      }

      .decision {
        display: grid;
        gap: 9px;
        justify-items: center;
        color: var(--muted);
        cursor: pointer;
        background: transparent;
        border: none;
      }

      .disc {
        display: grid;
        width: 64px;
        height: 64px;
        place-items: center;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 999px;
        transition: transform 120ms ease;
      }

      .decision:hover .disc {
        transform: translateY(-2px);
      }

      .decision.keep .disc {
        color: var(--keep);
        border-color: rgba(63, 178, 119, 0.55);
        box-shadow: 0 0 0 4px rgba(63, 178, 119, 0.1);
      }

      .decision.edit .disc {
        color: var(--edit);
        border-color: rgba(216, 152, 60, 0.5);
      }

      .decision.reject .disc {
        color: var(--reject);
        border-color: rgba(219, 93, 98, 0.5);
      }

      .decision .name {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
      }

      .key {
        display: inline-grid;
        min-width: 18px;
        height: 18px;
        padding: 0 5px;
        place-items: center;
        color: var(--subtle);
        font-size: 11px;
        font-weight: 700;
        background: var(--bg-2);
        border: 1px solid var(--line);
        border-radius: 5px;
      }

      .progress {
        display: flex;
        gap: 14px;
        align-items: center;
        width: min(70vw, 880px);
        font-size: 12px;
        color: var(--subtle);
      }

      .track {
        position: relative;
        flex: 1;
        height: 4px;
        overflow: hidden;
        background: #1b1c21;
        border-radius: 999px;
      }

      .track > i {
        position: absolute;
        inset: 0 74% 0 0;
        background: linear-gradient(90deg, var(--keep), #66c997);
        border-radius: 999px;
      }

      .legend {
        display: flex;
        gap: 16px;
        align-items: center;
      }

      .legend span {
        display: inline-flex;
        gap: 6px;
        align-items: center;
      }

      .swatch {
        width: 9px;
        height: 9px;
        border-radius: 3px;
      }

      svg {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <span class="logo">C</span>
          <span>Cullinary</span>
        </div>
        <div class="session">
          <span>2026-06-24 Ridge Session</span>
          <span class="dot"></span>
          <span>142 assets</span>
          <span class="dot"></span>
          <span>37 marked</span>
        </div>
        <button class="ghost" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 6h6M5 18h6M13 6h3a3 3 0 0 1 0 6h-8a3 3 0 0 0 0 6h3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          </svg>
          Move Plan
        </button>
      </header>

      <main class="stage">
        <button class="nav left" aria-label="Previous">
          <svg width="18" height="18" viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" /></svg>
        </button>
        <div class="deck">
          <div class="card peek prev"><div class="ph ph-forest"></div></div>
          <div class="card peek next"><div class="ph ph-port"></div></div>
          <div class="card hero" role="img" aria-label="Selected photo preview">
            <div class="ph ph-dusk"></div>
            <span class="badge">
              <svg width="16" height="16" viewBox="0 0 24 24"><path d="M5 13l4 4 10-11" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" /></svg>
              Keep
            </span>
            <span class="caption">DSC08421.ARW <strong>37 / 142</strong></span>
          </div>
        </div>
        <button class="nav right" aria-label="Next">
          <svg width="18" height="18" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" /></svg>
        </button>
      </main>

      <section class="controls">
        <div class="decisions">
          <button class="decision reject" type="button">
            <span class="disc">
              <svg width="26" height="26" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" /></svg>
            </span>
            <span class="name">Reject</span>
            <span class="key">X</span>
          </button>
          <button class="decision keep" type="button">
            <span class="disc">
              <svg width="28" height="28" viewBox="0 0 24 24"><path d="M5 13l4 4 10-11" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" /></svg>
            </span>
            <span class="name">Keep</span>
            <span class="key">P</span>
          </button>
          <button class="decision edit" type="button">
            <span class="disc">
              <svg width="24" height="24" viewBox="0 0 24 24"><path d="M4 20l4-1L19 8l-3-3L5 16l-1 4z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" /></svg>
            </span>
            <span class="name">Edit</span>
            <span class="key">E</span>
          </button>
        </div>
        <div class="progress">
          <span>26%</span>
          <div class="track"><i></i></div>
          <div class="legend">
            <span><i class="swatch" style="background: var(--keep)"></i> Keep 24</span>
            <span><i class="swatch" style="background: var(--edit)"></i> Edit 9</span>
            <span><i class="swatch" style="background: var(--reject)"></i> Reject 4</span>
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
