<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cullinary Prototype 07 - Duel</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0e13;
        --panel: #11151c;
        --panel-2: #161b23;
        --line: #232a34;
        --line-strong: #eef2f6;
        --text: #eef2f6;
        --muted: #9aa4b2;
        --subtle: #626d7c;
        --keep: #3fb277;
        --edit: #d8983c;
        --reject: #db5d62;
        --lead: #6ea8ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 1080px;
        height: 100vh;
        margin: 0;
        overflow: hidden;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--text);
        background: var(--bg);
      }

      button {
        font: inherit;
      }

      .shell {
        display: grid;
        grid-template-rows: 56px minmax(0, 1fr) 110px;
        height: 100vh;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 18px;
        background: var(--panel);
        border-bottom: 1px solid var(--line);
      }

      .brand {
        display: flex;
        gap: 12px;
        align-items: center;
      }

      .logo {
        display: grid;
        width: 28px;
        height: 28px;
        place-items: center;
        color: #0b0e13;
        font-weight: 800;
        background: #eff3ef;
        border-radius: 8px;
      }

      .title {
        font-size: 15px;
        font-weight: 700;
      }

      .context {
        font-size: 12px;
        color: var(--muted);
      }

      .context b {
        color: var(--lead);
      }

      .actions {
        display: flex;
        gap: 8px;
      }

      .tool {
        display: inline-flex;
        gap: 8px;
        align-items: center;
        height: 34px;
        padding: 0 13px;
        color: var(--text);
        cursor: pointer;
        background: var(--panel-2);
        border: 1px solid var(--line);
        border-radius: 7px;
      }

      .tool.muted {
        color: var(--muted);
        background: transparent;
      }

      .arena {
        position: relative;
        display: grid;
        grid-template-columns: 1fr 64px 1fr;
        min-height: 0;
        padding: 18px;
        gap: 0;
      }

      .frame {
        position: relative;
        display: grid;
        grid-template-rows: minmax(0, 1fr) auto;
        min-height: 0;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        overflow: hidden;
      }

      .frame.leading {
        border-color: rgba(110, 168, 255, 0.55);
        box-shadow: 0 0 0 1px rgba(110, 168, 255, 0.35), 0 24px 60px rgba(0, 0, 0, 0.45);
      }

      .photo {
        position: relative;
        min-height: 0;
        background: #06080b;
      }

      .ph {
        position: absolute;
        inset: 0;
      }

      .ph-a {
        background:
          radial-gradient(70% 50% at 60% 30%, rgba(255, 232, 198, 0.7) 0 10%, transparent 32%),
          linear-gradient(160deg, #15273a 0 40%, #355569 41% 60%, #c79a6a 61% 80%, #f0d8ad 81% 100%);
      }

      .ph-b {
        background:
          radial-gradient(70% 50% at 56% 34%, rgba(255, 226, 192, 0.62) 0 10%, transparent 34%),
          linear-gradient(160deg, #142536 0 41%, #335366 42% 60%, #c0925f 61% 81%, #ead2a3 82% 100%);
      }

      .tag {
        position: absolute;
        top: 14px;
        left: 14px;
        display: inline-flex;
        gap: 7px;
        align-items: center;
        height: 26px;
        padding: 0 11px;
        font-size: 12px;
        font-weight: 700;
        border-radius: 999px;
        background: rgba(8, 10, 14, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(6px);
      }

      .tag.lead {
        color: #06101f;
        background: var(--lead);
        border-color: var(--lead);
      }

      .panel-foot {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: center;
        padding: 12px 14px;
        border-top: 1px solid var(--line);
        background: var(--panel-2);
      }

      .meta .name {
        font-size: 13px;
        font-weight: 600;
      }

      .meta .stats {
        display: flex;
        gap: 12px;
        margin-top: 5px;
        font-size: 11px;
        color: var(--subtle);
      }

      .meta .stats b {
        color: var(--muted);
        font-weight: 600;
      }

      .mini-decisions {
        display: flex;
        gap: 6px;
      }

      .mini {
        display: grid;
        width: 36px;
        height: 36px;
        place-items: center;
        color: var(--muted);
        cursor: pointer;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .mini.keep:hover {
        color: var(--keep);
        border-color: rgba(63, 178, 119, 0.6);
      }

      .mini.edit:hover {
        color: var(--edit);
        border-color: rgba(216, 152, 60, 0.6);
      }

      .mini.reject:hover {
        color: var(--reject);
        border-color: rgba(219, 93, 98, 0.6);
      }

      .mini.on.keep {
        color: #06130b;
        background: var(--keep);
        border-color: var(--keep);
      }

      .gutter {
        display: grid;
        gap: 10px;
        align-content: center;
        justify-items: center;
      }

      .vs {
        display: grid;
        width: 40px;
        height: 40px;
        place-items: center;
        color: var(--subtle);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.5px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 999px;
      }

      .pick {
        display: grid;
        gap: 6px;
        justify-items: center;
      }

      .pick button {
        display: grid;
        width: 38px;
        height: 38px;
        place-items: center;
        color: var(--muted);
        cursor: pointer;
        background: var(--panel-2);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .pick button:hover {
        color: var(--lead);
        border-color: rgba(110, 168, 255, 0.5);
      }

      .pick span {
        font-size: 10px;
        color: var(--subtle);
      }

      .burst {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 16px;
        align-items: center;
        padding: 0 18px;
        background: var(--panel);
        border-top: 1px solid var(--line);
      }

      .burst-label {
        display: grid;
        gap: 3px;
      }

      .burst-label .k {
        font-size: 13px;
        font-weight: 700;
      }

      .burst-label .s {
        font-size: 11px;
        color: var(--subtle);
      }

      .burst-strip {
        display: flex;
        gap: 10px;
        align-items: center;
        overflow-x: auto;
        padding: 6px 0;
      }

      .bthumb {
        position: relative;
        flex: 0 0 104px;
        height: 70px;
        border: 2px solid transparent;
        border-radius: 8px;
        overflow: hidden;
      }

      .bthumb.in {
        border-color: var(--lead);
      }

      .bthumb::after {
        position: absolute;
        right: 6px;
        bottom: 6px;
        width: 11px;
        height: 11px;
        content: "";
        border-radius: 999px;
        background: var(--dot, transparent);
      }

      .bt1 { background: linear-gradient(160deg, #16273a, #c79a6a); }
      .bt2 { background: linear-gradient(160deg, #142536, #c0925f); }
      .bt3 { background: linear-gradient(160deg, #182a3d, #b98c5a); --dot: var(--reject); }
      .bt4 { background: linear-gradient(160deg, #13243a, #caa06d); }
      .bt5 { background: linear-gradient(160deg, #172a40, #c49866); --dot: var(--reject); }

      svg {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <span class="logo">C</span>
          <div>
            <div class="title">Cullinary &mdash; Compare</div>
            <div class="context">Choosing the keeper from a <b>5-frame burst</b> &middot; /Volumes/Photo/Ingest/Ridge</div>
          </div>
        </div>
        <div class="actions">
          <button class="tool muted" type="button">Single view</button>
          <button class="tool" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24"><path d="M5 6h6M5 18h6M13 6h3a3 3 0 0 1 0 6h-8a3 3 0 0 0 0 6h3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" /></svg>
            Move Plan
          </button>
        </div>
      </header>

      <main class="arena">
        <section class="frame leading">
          <div class="photo">
            <div class="ph ph-a"></div>
            <span class="tag lead">Leading pick</span>
          </div>
          <div class="panel-foot">
            <div class="meta">
              <div class="name">DSC08421.ARW</div>
              <div class="stats"><span>Focus <b>sharp</b></span><span>Exp <b>+0.0</b></span><span>RAW + JPEG</span></div>
            </div>
            <div class="mini-decisions">
              <button class="mini keep on" type="button" aria-label="Keep">
                <svg width="18" height="18" viewBox="0 0 24 24"><path d="M5 13l4 4 10-11" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" /></svg>
              </button>
              <button class="mini edit" type="button" aria-label="Edit">
                <svg width="17" height="17" viewBox="0 0 24 24"><path d="M4 20l4-1L19 8l-3-3L5 16l-1 4z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" /></svg>
              </button>
              <button class="mini reject" type="button" aria-label="Reject">
                <svg width="17" height="17" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" /></svg>
              </button>
            </div>
          </div>
        </section>

        <div class="gutter">
          <div class="vs">VS</div>
          <div class="pick">
            <button type="button" aria-label="Prefer left">
              <svg width="18" height="18" viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" /></svg>
            </button>
            <span>pick</span>
            <button type="button" aria-label="Prefer right">
              <svg width="18" height="18" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" /></svg>
            </button>
          </div>
        </div>

        <section class="frame">
          <div class="photo">
            <div class="ph ph-b"></div>
            <span class="tag">Candidate</span>
          </div>
          <div class="panel-foot">
            <div class="meta">
              <div class="name">DSC08422.ARW</div>
              <div class="stats"><span>Focus <b>soft</b></span><span>Exp <b>-0.3</b></span><span>RAW + JPEG</span></div>
            </div>
            <div class="mini-decisions">
              <button class="mini keep" type="button" aria-label="Keep">
                <svg width="18" height="18" viewBox="0 0 24 24"><path d="M5 13l4 4 10-11" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" /></svg>
              </button>
              <button class="mini edit" type="button" aria-label="Edit">
                <svg width="17" height="17" viewBox="0 0 24 24"><path d="M4 20l4-1L19 8l-3-3L5 16l-1 4z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" /></svg>
              </button>
              <button class="mini reject" type="button" aria-label="Reject">
                <svg width="17" height="17" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" /></svg>
              </button>
            </div>
          </div>
        </section>
      </main>

      <footer class="burst">
        <div class="burst-label">
          <span class="k">Burst cluster</span>
          <span class="s">5 similar frames</span>
        </div>
        <div class="burst-strip">
          <span class="bthumb bt1 in"></span>
          <span class="bthumb bt2 in"></span>
          <span class="bthumb bt3"></span>
          <span class="bthumb bt4"></span>
          <span class="bthumb bt5"></span>
        </div>
      </footer>
    </div>
  </body>
</html>
