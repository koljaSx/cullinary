<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cullinary Prototype 08 - Reel</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #100d0b;
        --canvas: #0a0807;
        --panel: #19140f;
        --panel-2: #221a13;
        --line: #322820;
        --text: #f3ece2;
        --muted: #b3a392;
        --subtle: #786959;
        --keep: #54b07d;
        --edit: #e0a44a;
        --reject: #df6a64;
        --accent: #e0a44a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 1080px;
        height: 100vh;
        margin: 0;
        overflow: hidden;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--text);
        background: var(--bg);
      }

      button {
        font: inherit;
      }

      .shell {
        display: grid;
        grid-template-columns: 140px minmax(0, 1fr);
        grid-template-rows: 52px minmax(0, 1fr) 28px;
        height: 100vh;
      }

      .topbar {
        grid-column: 1 / -1;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 18px;
        background: var(--panel);
        border-bottom: 1px solid var(--line);
      }

      .brand {
        display: flex;
        gap: 11px;
        align-items: center;
        font-size: 15px;
        font-weight: 700;
      }

      .logo {
        display: grid;
        width: 26px;
        height: 26px;
        place-items: center;
        color: #100d0b;
        font-weight: 800;
        background: #f1e7d8;
        border-radius: 7px;
      }

      .meter {
        display: flex;
        gap: 14px;
        align-items: center;
        font-size: 12px;
        color: var(--muted);
      }

      .bar {
        position: relative;
        width: 260px;
        height: 6px;
        overflow: hidden;
        background: #261d15;
        border-radius: 999px;
      }

      .bar > i {
        position: absolute;
        inset: 0;
        background: var(--seg);
      }

      .bar .keep { width: 17%; left: 0; background: var(--keep); }
      .bar .edit { width: 6%; left: 17%; background: var(--edit); }
      .bar .reject { width: 3%; left: 23%; background: var(--reject); }

      .actions {
        display: flex;
        gap: 8px;
      }

      .tool {
        display: inline-flex;
        gap: 8px;
        align-items: center;
        height: 32px;
        padding: 0 13px;
        color: var(--text);
        cursor: pointer;
        background: var(--panel-2);
        border: 1px solid var(--line);
        border-radius: 7px;
      }

      .tool.muted {
        color: var(--muted);
        background: transparent;
      }

      .reel {
        display: grid;
        gap: 10px;
        align-content: start;
        padding: 12px 10px;
        overflow-y: auto;
        background: var(--canvas);
        border-right: 1px solid var(--line);
      }

      .rthumb {
        position: relative;
        height: 88px;
        cursor: pointer;
        border: 2px solid transparent;
        border-radius: 9px;
        overflow: hidden;
      }

      .rthumb.current {
        border-color: var(--text);
        box-shadow: 0 0 0 3px rgba(224, 164, 74, 0.18);
      }

      .rthumb::after {
        position: absolute;
        top: 6px;
        right: 6px;
        display: grid;
        width: 18px;
        height: 18px;
        place-items: center;
        content: var(--mark, "");
        font-size: 11px;
        font-weight: 800;
        color: #0a0807;
        background: var(--mc, transparent);
        border-radius: 999px;
      }

      .r1 { background: linear-gradient(160deg, #1b2a38 0 40%, #b98b5e 100%); --mark: "\2713"; --mc: var(--keep); }
      .r2 { background: linear-gradient(150deg, #2a1c22 0 42%, #c89aa0 100%); --mark: "\2715"; --mc: var(--reject); }
      .r3 { background: linear-gradient(28deg, #14231d 0 38%, #cdd4c6 100%); }
      .r4 { background: linear-gradient(160deg, #15273a 0 38%, #f0d6a8 100%); --mark: "\2713"; --mc: var(--keep); }
      .r5 { background: linear-gradient(140deg, #241c18 0 40%, #cbd3b4 100%); --mark: "\270E"; --mc: var(--edit); }
      .r6 { background: linear-gradient(150deg, #171b16 0 40%, #bec9bd 100%); }
      .r7 { background: linear-gradient(135deg, #211820 0 36%, #f2d7de 100%); }

      .stage {
        position: relative;
        display: grid;
        place-items: center;
        min-height: 0;
        padding: 22px;
        background:
          radial-gradient(120% 90% at 30% 0%, #15110c 0%, var(--canvas) 65%),
          var(--canvas);
      }

      .photo {
        position: relative;
        width: min(72vw, 1000px);
        height: min(72vh, 680px);
        overflow: hidden;
        border-radius: 12px;
        box-shadow: 0 36px 100px rgba(0, 0, 0, 0.6);
        background:
          radial-gradient(78% 56% at 64% 26%, rgba(255, 228, 188, 0.85) 0 8%, transparent 30%),
          linear-gradient(162deg, #14253a 0 38%, #335468 39% 56%, #bb8b5b 57% 76%, #f1d8aa 77% 100%);
      }

      .caption {
        position: absolute;
        bottom: 16px;
        left: 16px;
        display: flex;
        gap: 12px;
        align-items: center;
        height: 32px;
        padding: 0 14px;
        font-size: 13px;
        background: rgba(10, 8, 7, 0.62);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 999px;
        backdrop-filter: blur(8px);
      }

      .caption strong {
        color: #fff;
      }

      .dock {
        position: absolute;
        top: 50%;
        right: 30px;
        display: grid;
        gap: 12px;
        padding: 14px 12px;
        background: rgba(25, 20, 15, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(14px);
        transform: translateY(-50%);
      }

      .dock-btn {
        display: grid;
        grid-template-columns: 42px auto;
        gap: 10px;
        align-items: center;
        width: 150px;
        height: 52px;
        padding: 0 10px 0 0;
        color: var(--text);
        cursor: pointer;
        background: rgba(34, 26, 19, 0.6);
        border: 1px solid var(--line);
        border-radius: 12px;
        text-align: left;
        transition: transform 120ms ease;
      }

      .dock-btn:hover {
        transform: translateX(-3px);
      }

      .dock-ic {
        display: grid;
        width: 42px;
        height: 100%;
        place-items: center;
        border-radius: 11px 0 0 11px;
      }

      .dock-btn.keep .dock-ic { color: var(--keep); }
      .dock-btn.edit .dock-ic { color: var(--edit); }
      .dock-btn.reject .dock-ic { color: var(--reject); }

      .dock-btn.keep {
        background: rgba(84, 176, 125, 0.16);
        border-color: rgba(84, 176, 125, 0.45);
      }

      .dock-txt {
        display: grid;
        gap: 2px;
      }

      .dock-txt b {
        font-size: 14px;
      }

      .dock-txt .key {
        font-size: 11px;
        color: var(--subtle);
      }

      .loupe-hint {
        position: absolute;
        bottom: 16px;
        right: 30px;
        display: inline-flex;
        gap: 8px;
        align-items: center;
        font-size: 11px;
        color: var(--subtle);
      }

      .kc {
        display: inline-grid;
        min-width: 16px;
        height: 16px;
        padding: 0 5px;
        place-items: center;
        font-size: 10px;
        font-weight: 700;
        background: #1c1611;
        border: 1px solid var(--line);
        border-radius: 4px;
      }

      .statusbar {
        grid-column: 1 / -1;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 14px;
        font-size: 11px;
        color: var(--subtle);
        background: var(--panel);
        border-top: 1px solid var(--line);
      }

      svg {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand"><span class="logo">C</span> Cullinary</div>
        <div class="meter">
          <span>37 / 142</span>
          <div class="bar"><i class="keep"></i><i class="edit"></i><i class="reject"></i></div>
          <span>26% reviewed</span>
        </div>
        <div class="actions">
          <button class="tool muted" type="button">Rescan</button>
          <button class="tool" type="button">
            <svg width="15" height="15" viewBox="0 0 24 24"><path d="M5 6h6M5 18h6M13 6h3a3 3 0 0 1 0 6h-8a3 3 0 0 0 0 6h3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" /></svg>
            Move Plan
          </button>
        </div>
      </header>

      <nav class="reel" aria-label="Photo reel">
        <span class="rthumb r1"></span>
        <span class="rthumb r2"></span>
        <span class="rthumb r4 current"></span>
        <span class="rthumb r5"></span>
        <span class="rthumb r3"></span>
        <span class="rthumb r6"></span>
        <span class="rthumb r7"></span>
        <span class="rthumb r1"></span>
      </nav>

      <main class="stage">
        <div class="photo" role="img" aria-label="Selected photo preview">
          <span class="caption">DSC08421.ARW &middot; RAW + JPEG + XMP <strong>37 / 142</strong></span>
        </div>

        <div class="dock" aria-label="Decision dock">
          <button class="dock-btn keep" type="button">
            <span class="dock-ic">
              <svg width="22" height="22" viewBox="0 0 24 24"><path d="M5 13l4 4 10-11" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" /></svg>
            </span>
            <span class="dock-txt"><b>Keep</b><span class="key">P</span></span>
          </button>
          <button class="dock-btn edit" type="button">
            <span class="dock-ic">
              <svg width="20" height="20" viewBox="0 0 24 24"><path d="M4 20l4-1L19 8l-3-3L5 16l-1 4z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" /></svg>
            </span>
            <span class="dock-txt"><b>Edit</b><span class="key">E</span></span>
          </button>
          <button class="dock-btn reject" type="button">
            <span class="dock-ic">
              <svg width="20" height="20" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" /></svg>
            </span>
            <span class="dock-txt"><b>Reject</b><span class="key">X</span></span>
          </button>
        </div>

        <div class="loupe-hint"><span class="kc">Space</span> 100% loupe &middot; <span class="kc">&larr;</span><span class="kc">&rarr;</span> navigate</div>
      </main>

      <footer class="statusbar">
        <span>/Volumes/Photo/Ingest/2026-06-24 Ridge Session</span>
        <span>Keep 24 &middot; Edit 9 &middot; Reject 4 &middot; 0 conflicts</span>
      </footer>
    </div>
  </body>
</html>
